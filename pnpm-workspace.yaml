packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@testing-library/react': ^16.3.2
  "@types/node": ^24
  happy-dom: ^20.8.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.12
  vite-plus: 0.1.12
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^3.25.76

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
