name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build packages
        run: |
          cd packages/orbit-router && vp pack && cd ../..
          cd packages/orbit-query && vp pack && cd ../..
          cd packages/orbit-form && vp pack && cd ../..
          cd packages/orbit-rpc && vp pack && cd ../..

      - run: vp check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [orbit-router, orbit-query, orbit-form]
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp test
        working-directory: packages/${{ matrix.package }}
