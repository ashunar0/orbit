name: Publish

on:
  push:
    tags:
      - "orbit-router@*"
      - "orbit-query@*"
      - "orbit-form@*"
      - "orbit-rpc@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PACKAGE@$VERSION"

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ steps.pkg.outputs.package }}/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.pkg.outputs.version }}" ]; then
            echo "Tag version (${{ steps.pkg.outputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: pnpm run build
        working-directory: packages/${{ steps.pkg.outputs.package }}

      - run: pnpm publish --no-git-checks --provenance
        working-directory: packages/${{ steps.pkg.outputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
